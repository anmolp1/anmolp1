  <!-- Tagline -->
  <g fill="#00ff41" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="14" opacity="0.9">
    <text x="400" y="222" text-anchor="middle">founder @ mldeep systems</text>
    <text x="400" y="246" text-anchor="middle">ai agent reliability engineering</text>
  </g>

  <!-- Prompt line with cursor blink -->
  <text x="40" y="300" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" fill="#00ff41" opacity="0.7">anmol@mldeep:~$</text>
  <text x="200" y="300" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" fill="#00ff41" opacity="0.9">I diagnose why AI agents break in production</text>

  <!-- Blinking cursor -->
