    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom prompt -->
  <text x="40" y="340" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" fill="#00ff41" opacity="0.5">anmol@mldeep:~$ _</text>

  <!-- Subtle vignette -->
  <rect width="800" height="380" rx="10" fill="none" stroke="#00ff41" stroke-opacity="0.1" stroke-width="1"/>
</svg>