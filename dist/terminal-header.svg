<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="800" height="380" rx="10" fill="#0a0a0a"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="10" fill="#1a1a1a"/>
  <rect y="20" width="800" height="12" fill="#1a1a1a"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="400" y="20" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="12" fill="#666">anmol@mldeep: ~</text>

  <!-- Scanline overlay -->
  <rect y="32" width="800" height="348" fill="url(#scanline)" opacity="0.5"/>

